<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Operational Truth Audit</title>
  <desc id="desc">Validation diagram showing clean baseline reset, controlled scenario data, workflow extraction, integrity checks, read model consistency, and evidence pack.</desc>
  
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102033"/>
      <stop offset="100%" stop-color="#0B1424"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38BDF8"/>
    </marker>
    <style>
      .bg { fill: #07111F; }
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 34px; font-weight: 760; fill: #F8FAFC; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 17px; fill: #CBD5E1; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 740; fill: #F8FAFC; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #CBD5E1; }
      .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #94A3B8; }
      .card { fill: url(#panelGrad); stroke: #1E3A5F; stroke-width: 1.2; rx: 22; filter: url(#softShadow); }
      .cardLight { fill: #0E1B2B; stroke: #27496D; stroke-width: 1.2; rx: 18; }
      .accentLine { stroke: url(#accentGrad); stroke-width: 4; stroke-linecap: round; }
      .arrow { stroke: #38BDF8; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .arrowMuted { stroke: #64748B; stroke-width: 2.2; fill: none; marker-end: url(#arrow); opacity: 0.75; }
      .orange { fill: #FDBA74; }
      .cyan { fill: #7DD3FC; }
      .muted { fill: #94A3B8; }
      .pill { fill: #11243A; stroke: #2A4E73; stroke-width: 1; rx: 14; }
    </style>
  </defs>

  <rect width="1600" height="980" class="bg"/>
  <text x="90" y="95" class="title">Operational Truth Audit</text>
  <text x="90" y="130" class="subtitle">The final proof step checked whether workflow, payment, TOIL, and read-model layers agreed internally.</text>
  <line x1="90" y1="160" x2="1510" y2="160" class="accentLine"/>

  
    <rect x="95" y="230" width="250" height="150" class="card"/>
    <circle cx="127" cy="264" r="16" fill="#0EA5E9"/><text x="127" y="269" text-anchor="middle" class="tiny" fill="#FFFFFF">01</text>
    <text x="155" y="271" class="label">Clean baseline reset</text>
    <text x="121" y="306" class="small">Clear workflow/effect rows</text>
<text x="121" y="328" class="small">Preserve generated truth</text>
<text x="121" y="350" class="small">Keep TOIL causality</text>
    
  
    <rect x="395" y="230" width="250" height="150" class="card"/>
    <circle cx="427" cy="264" r="16" fill="#0EA5E9"/><text x="427" y="269" text-anchor="middle" class="tiny" fill="#FFFFFF">02</text>
    <text x="455" y="271" class="label">Controlled scenarios</text>
    <text x="421" y="306" class="small">AL and SICK</text>
<text x="421" y="328" class="small">Cover and reassignment</text>
<text x="421" y="350" class="small">Swap sanity</text>
    
  
    <rect x="695" y="230" width="250" height="150" class="card"/>
    <circle cx="727" cy="264" r="16" fill="#0EA5E9"/><text x="727" y="269" text-anchor="middle" class="tiny" fill="#FFFFFF">03</text>
    <text x="755" y="271" class="label">DB extraction</text>
    <text x="721" y="306" class="small">Workflow parents</text>
<text x="721" y="328" class="small">Payment events</text>
<text x="721" y="350" class="small">TOIL effects</text>
    
  
    <rect x="995" y="230" width="250" height="150" class="card"/>
    <circle cx="1027" cy="264" r="16" fill="#0EA5E9"/><text x="1027" y="269" text-anchor="middle" class="tiny" fill="#FFFFFF">04</text>
    <text x="1055" y="271" class="label">Integrity checks</text>
    <text x="1021" y="306" class="small">Invalid links</text>
<text x="1021" y="328" class="small">Wrong family use</text>
<text x="1021" y="350" class="small">Duplicate rows</text>
    
  
    <rect x="1295" y="230" width="210" height="150" class="card"/>
    <circle cx="1327" cy="264" r="16" fill="#0EA5E9"/><text x="1327" y="269" text-anchor="middle" class="tiny" fill="#FFFFFF">05</text>
    <text x="1355" y="271" class="label">Evidence pack</text>
    <text x="1321" y="306" class="small">Audit summary</text>
<text x="1321" y="328" class="small">Diagrams</text>
<text x="1321" y="350" class="small">Sanitised captures</text>
    

  <path d="M345 305 L395 305" class="arrow"/>
  <path d="M645 305 L695 305" class="arrow"/>
  <path d="M945 305 L995 305" class="arrow"/>
  <path d="M1245 305 L1295 305" class="arrow"/>

  <rect x="150" y="530" width="1300" height="300" class="card"/>
  <text x="195" y="585" class="label">Audit checks</text>
  <text x="195" y="620" class="small">The goal was to find impossible or suspicious operational states, not just verify happy-path UI behaviour.</text>

  <rect x="205" y="665" width="365" height="45" class="pill"/><text x="225" y="694" class="small">No invalid cover parent links</text>
  <rect x="205" y="725" width="365" height="45" class="pill"/><text x="225" y="754" class="small">No invalid reassignment parent links</text>

  <rect x="620" y="665" width="365" height="45" class="pill"/><text x="640" y="694" class="small">No wrong workflow-family use</text>
  <rect x="620" y="725" width="365" height="45" class="pill"/><text x="640" y="754" class="small">No incorrect weekday-core deductions</text>

  <rect x="1035" y="665" width="365" height="45" class="pill"/><text x="1055" y="694" class="small">No missing compensated deductions</text>
  <rect x="1035" y="725" width="365" height="45" class="pill"/><text x="1055" y="754" class="small">No duplicate primary/supplemental rows</text>

  <text x="195" y="895" class="tiny">Validation target: schedule truth, workflow parents, derived effects, payment events, TOIL outcomes, and read-model projection.</text>
</svg>
