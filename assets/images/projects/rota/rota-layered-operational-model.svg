<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Layered Operational Model</title>
  <desc id="desc">Architecture diagram showing configuration truth, generated baseline truth, workflow truth, derived effect truth, trusted read models, and the FastAPI HTMX interface.</desc>
  
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102033"/>
      <stop offset="100%" stop-color="#0B1424"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38BDF8"/>
    </marker>
    <style>
      .bg { fill: #07111F; }
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 34px; font-weight: 760; fill: #F8FAFC; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 17px; fill: #CBD5E1; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 740; fill: #F8FAFC; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #CBD5E1; }
      .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #94A3B8; }
      .card { fill: url(#panelGrad); stroke: #1E3A5F; stroke-width: 1.2; rx: 22; filter: url(#softShadow); }
      .cardLight { fill: #0E1B2B; stroke: #27496D; stroke-width: 1.2; rx: 18; }
      .accentLine { stroke: url(#accentGrad); stroke-width: 4; stroke-linecap: round; }
      .arrow { stroke: #38BDF8; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .arrowMuted { stroke: #64748B; stroke-width: 2.2; fill: none; marker-end: url(#arrow); opacity: 0.75; }
      .orange { fill: #FDBA74; }
      .cyan { fill: #7DD3FC; }
      .muted { fill: #94A3B8; }
      .pill { fill: #11243A; stroke: #2A4E73; stroke-width: 1; rx: 14; }
    </style>
  </defs>

  <rect width="1600" height="1050" class="bg"/>
  <rect x="70" y="60" width="1460" height="930" rx="34" fill="#0B1424" stroke="#183452" stroke-width="1.4"/>
  <text x="110" y="125" class="title">Layered Operational Model</text>
  <text x="110" y="160" class="subtitle">Base truth is generated, operational changes are explicit workflows, and read models project the trusted view.</text>
  <line x1="110" y1="190" x2="1490" y2="190" class="accentLine"/>

  
    <rect x="110" y="245" width="270" height="190" class="card"/>
    <circle cx="142" cy="279" r="16" fill="#0EA5E9"/><text x="142" y="284" text-anchor="middle" class="tiny" fill="#FFFFFF">01</text>
    <text x="170" y="286" class="label">Configuration truth</text>
    <text x="136" y="321" class="small">Staff profile</text>
<text x="136" y="343" class="small">Shift types and families</text>
<text x="136" y="365" class="small">Pattern versions</text>
<text x="136" y="387" class="small">Payment rules</text>
<text x="136" y="409" class="small">TOIL causality rules</text>
    
  
    <rect x="410" y="245" width="270" height="190" class="card"/>
    <circle cx="442" cy="279" r="16" fill="#0EA5E9"/><text x="442" y="284" text-anchor="middle" class="tiny" fill="#FFFFFF">02</text>
    <text x="470" y="286" class="label">Generated baseline</text>
    <text x="436" y="321" class="small">Generated rota</text>
<text x="436" y="343" class="small">Generated TOIL</text>
<text x="436" y="365" class="small">TOIL links</text>
<text x="436" y="387" class="small">Pattern days</text>
<text x="436" y="409" class="small">Original reference state</text>
    
  
    <rect x="710" y="245" width="270" height="190" class="card"/>
    <circle cx="742" cy="279" r="16" fill="#0EA5E9"/><text x="742" y="284" text-anchor="middle" class="tiny" fill="#FFFFFF">03</text>
    <text x="770" y="286" class="label">Workflow truth</text>
    <text x="736" y="321" class="small">Annual Leave</text>
<text x="736" y="343" class="small">Sickness</text>
<text x="736" y="365" class="small">Cover</text>
<text x="736" y="387" class="small">Reassignment</text>
<text x="736" y="409" class="small">Same-date swaps</text>
    
  
    <rect x="1010" y="245" width="270" height="190" class="card"/>
    <circle cx="1042" cy="279" r="16" fill="#0EA5E9"/><text x="1042" y="284" text-anchor="middle" class="tiny" fill="#FFFFFF">04</text>
    <text x="1070" y="286" class="label">Derived effects</text>
    <text x="1036" y="321" class="small">Payment events</text>
<text x="1036" y="343" class="small">TOIL resolution</text>
<text x="1036" y="365" class="small">TOIL event ledger</text>
<text x="1036" y="387" class="small">Schedule adjustments</text>
<text x="1036" y="409" class="small">Cancellation effects</text>
    
  
    <rect x="1310" y="245" width="180" height="190" class="card"/>
    <circle cx="1342" cy="279" r="16" fill="#0EA5E9"/><text x="1342" y="284" text-anchor="middle" class="tiny" fill="#FFFFFF">05</text>
    <text x="1370" y="286" class="label">Read models</text>
    <text x="1336" y="321" class="small">Effective schedule</text>
<text x="1336" y="343" class="small">Supplemental work</text>
<text x="1336" y="365" class="small">TOIL projection</text>
<text x="1336" y="387" class="small">Bank balance</text>
<text x="1336" y="409" class="small">Payment reporting</text>
    

  <path d="M380 340 L410 340" class="arrow"/>
  <path d="M680 340 L710 340" class="arrow"/>
  <path d="M980 340 L1010 340" class="arrow"/>
  <path d="M1280 340 L1310 340" class="arrow"/>

  <rect x="185" y="555" width="1230" height="190" class="card"/>
  <text x="225" y="607" class="label">SQL Server domain engine</text>
  <text x="225" y="640" class="small">Stored procedures enforce transitions. Views project final operational truth. Derived events preserve traceability.</text>
  <rect x="225" y="675" width="220" height="38" class="pill"/><text x="245" y="700" class="small">preflight / submit / decide</text>
  <rect x="470" y="675" width="175" height="38" class="pill"/><text x="492" y="700" class="small">approved-only effect</text>
  <rect x="670" y="675" width="185" height="38" class="pill"/><text x="692" y="700" class="small">audit-preserving rows</text>
  <rect x="880" y="675" width="170" height="38" class="pill"/><text x="902" y="700" class="small">linked consequences</text>
  <rect x="1075" y="675" width="250" height="38" class="pill"/><text x="1097" y="700" class="small">read-model driven interface</text>

  <path d="M800 435 L800 555" class="arrow"/>

  <rect x="340" y="825" width="920" height="95" class="cardLight"/>
  <text x="385" y="875" class="label">FastAPI / HTMX operational interface</text>
  <text x="385" y="904" class="small">My Shifts · Daily Board · Admin Workbench · Payment event reporting · TOIL views</text>
  <path d="M800 745 L800 825" class="arrow"/>
</svg>
