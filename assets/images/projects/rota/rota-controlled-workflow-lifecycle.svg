<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850" role="img" aria-labelledby="title desc">
  <title id="title">Controlled Workflow Lifecycle</title>
  <desc id="desc">State diagram showing preflight, submit, pending, approve, reject, cancel, derived effects, and read model projection.</desc>
  
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102033"/>
      <stop offset="100%" stop-color="#0B1424"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38BDF8"/>
    </marker>
    <style>
      .bg { fill: #07111F; }
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 34px; font-weight: 760; fill: #F8FAFC; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 17px; fill: #CBD5E1; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 740; fill: #F8FAFC; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #CBD5E1; }
      .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #94A3B8; }
      .card { fill: url(#panelGrad); stroke: #1E3A5F; stroke-width: 1.2; rx: 22; filter: url(#softShadow); }
      .cardLight { fill: #0E1B2B; stroke: #27496D; stroke-width: 1.2; rx: 18; }
      .accentLine { stroke: url(#accentGrad); stroke-width: 4; stroke-linecap: round; }
      .arrow { stroke: #38BDF8; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .arrowMuted { stroke: #64748B; stroke-width: 2.2; fill: none; marker-end: url(#arrow); opacity: 0.75; }
      .orange { fill: #FDBA74; }
      .cyan { fill: #7DD3FC; }
      .muted { fill: #94A3B8; }
      .pill { fill: #11243A; stroke: #2A4E73; stroke-width: 1; rx: 14; }
    </style>
  </defs>

  <rect width="1500" height="850" class="bg"/>
  <text x="90" y="95" class="title">Controlled Workflow Lifecycle</text>
  <text x="90" y="130" class="subtitle">Requests are reviewable before approval, but only approved workflows affect operational truth.</text>
  <line x1="90" y1="160" x2="1410" y2="160" class="accentLine"/>

  
    <rect x="120" y="270" width="215" height="130" class="card"/>
    <circle cx="152" cy="304" r="16" fill="#0EA5E9"/><text x="152" y="309" text-anchor="middle" class="tiny" fill="#FFFFFF">01</text>
    <text x="180" y="311" class="label">Preflight</text>
    <text x="146" y="346" class="small">Validate before write</text>
<text x="146" y="368" class="small">Return allow/block</text>
<text x="146" y="390" class="small">Explain reason</text>
    
  
    <rect x="395" y="270" width="215" height="130" class="card"/>
    <circle cx="427" cy="304" r="16" fill="#0EA5E9"/><text x="427" y="309" text-anchor="middle" class="tiny" fill="#FFFFFF">02</text>
    <text x="455" y="311" class="label">Submit</text>
    <text x="421" y="346" class="small">Create pending row</text>
<text x="421" y="368" class="small">Visible for review</text>
<text x="421" y="390" class="small">No active effect</text>
    
  
    <rect x="670" y="270" width="215" height="130" class="card"/>
    <circle cx="702" cy="304" r="16" fill="#0EA5E9"/><text x="702" y="309" text-anchor="middle" class="tiny" fill="#FFFFFF">03</text>
    <text x="730" y="311" class="label">Pending</text>
    <text x="696" y="346" class="small">Reviewable</text>
<text x="696" y="368" class="small">Inert</text>
<text x="696" y="390" class="small">Audit started</text>
    
  
    <rect x="945" y="205" width="230" height="120" class="card"/>
    <circle cx="977" cy="239" r="16" fill="#0EA5E9"/><text x="977" y="244" text-anchor="middle" class="tiny" fill="#FFFFFF">04</text>
    <text x="1005" y="246" class="label">Approve</text>
    <text x="971" y="281" class="small">Create effects</text>
<text x="971" y="303" class="small">Update projections</text>
    
  
    <rect x="945" y="380" width="230" height="120" class="card"/>
    <circle cx="977" cy="414" r="16" fill="#0EA5E9"/><text x="977" y="419" text-anchor="middle" class="tiny" fill="#FFFFFF">05</text>
    <text x="1005" y="421" class="label">Reject / Cancel</text>
    <text x="971" y="456" class="small">Audit-only</text>
<text x="971" y="478" class="small">Unwind if active</text>
    
  
    <rect x="1240" y="270" width="215" height="130" class="card"/>
    <circle cx="1272" cy="304" r="16" fill="#0EA5E9"/><text x="1272" y="309" text-anchor="middle" class="tiny" fill="#FFFFFF">06</text>
    <text x="1300" y="311" class="label">Read models</text>
    <text x="1266" y="346" class="small">Effective schedule</text>
<text x="1266" y="368" class="small">TOIL projection</text>
<text x="1266" y="390" class="small">Payment reporting</text>
    

  <path d="M335 335 L395 335" class="arrow"/>
  <path d="M610 335 L670 335" class="arrow"/>
  <path d="M885 335 C910 335 915 265 945 265" class="arrow"/>
  <path d="M885 335 C910 335 915 440 945 440" class="arrow"/>
  <path d="M1175 265 C1215 265 1200 335 1240 335" class="arrow"/>
  <path d="M1175 440 C1215 440 1200 335 1240 335" class="arrowMuted"/>

  <rect x="290" y="625" width="920" height="95" class="cardLight"/>
  <text x="330" y="672" class="label">Lifecycle rule</text>
  <text x="330" y="702" class="small">Pending rows are visible but inert. Approved rows create effects. Rejected or cancelled rows remain part of the audit trail.</text>
</svg>
