<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Primary vs Supplemental Truth</title>
  <desc id="desc">Diagram comparing primary schedule truth, supplemental work, and a projected board view where a staff member has both a primary day shift and supplemental night cover.</desc>
  
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102033"/>
      <stop offset="100%" stop-color="#0B1424"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38BDF8"/>
    </marker>
    <style>
      .bg { fill: #07111F; }
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 34px; font-weight: 760; fill: #F8FAFC; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 17px; fill: #CBD5E1; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 740; fill: #F8FAFC; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #CBD5E1; }
      .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #94A3B8; }
      .card { fill: url(#panelGrad); stroke: #1E3A5F; stroke-width: 1.2; rx: 22; filter: url(#softShadow); }
      .cardLight { fill: #0E1B2B; stroke: #27496D; stroke-width: 1.2; rx: 18; }
      .accentLine { stroke: url(#accentGrad); stroke-width: 4; stroke-linecap: round; }
      .arrow { stroke: #38BDF8; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .arrowMuted { stroke: #64748B; stroke-width: 2.2; fill: none; marker-end: url(#arrow); opacity: 0.75; }
      .orange { fill: #FDBA74; }
      .cyan { fill: #7DD3FC; }
      .muted { fill: #94A3B8; }
      .pill { fill: #11243A; stroke: #2A4E73; stroke-width: 1; rx: 14; }
    </style>
  </defs>

  <rect width="1500" height="900" class="bg"/>
  <text x="90" y="95" class="title">Primary vs Supplemental Truth</text>
  <text x="90" y="130" class="subtitle">Cover is displayed as additional approved work without corrupting the primary schedule row.</text>
  <line x1="90" y1="160" x2="1410" y2="160" class="accentLine"/>

  <rect x="95" y="245" width="360" height="360" class="card"/>
  <text x="130" y="300" class="label">Primary schedule truth</text>
  <text x="130" y="335" class="small">One main state per staff member per date.</text>
  <rect x="135" y="390" width="280" height="72" rx="16" fill="#13243A" stroke="#2A4E73"/>
  <text x="160" y="420" class="small">Staff B</text>
  <text x="160" y="448" class="label">DAY</text>
  <text x="160" y="500" class="tiny">Base/effective primary state remains traceable.</text>

  <rect x="570" y="245" width="360" height="360" class="card"/>
  <text x="605" y="300" class="label">Supplemental work</text>
  <text x="605" y="335" class="small">Zero-to-many approved extra obligations.</text>
  <rect x="610" y="390" width="280" height="72" rx="16" fill="#13243A" stroke="#2A4E73"/>
  <text x="635" y="420" class="small">Staff B</text>
  <text x="635" y="448" class="label">NIGHT cover</text>
  <text x="635" y="500" class="tiny">Linked to parent absence and cover workflow.</text>

  <rect x="1045" y="245" width="360" height="360" class="card"/>
  <text x="1080" y="300" class="label">Projected board view</text>
  <text x="1080" y="335" class="small">The interface shows both truths clearly.</text>
  <rect x="1085" y="382" width="280" height="58" rx="14" fill="#13243A" stroke="#2A4E73"/>
  <text x="1110" y="418" class="small">Staff B · Primary · DAY</text>
  <rect x="1085" y="458" width="280" height="58" rx="14" fill="#1C2B1D" stroke="#3C7A40"/>
  <text x="1110" y="494" class="small">Staff B · Supplemental · NIGHT cover</text>

  <path d="M455 425 L570 425" class="arrow"/>
  <path d="M930 425 L1045 425" class="arrow"/>

  <rect x="255" y="710" width="990" height="90" class="cardLight"/>
  <text x="295" y="755" class="label">Design principle</text>
  <text x="295" y="785" class="small">The system combines primary schedule truth with supplemental work at the read-model layer instead of mutating the base rota row.</text>
</svg>
